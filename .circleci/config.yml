version: 2.1

jobs:
  build-with-gpu:
    machine:
      image: linux-cuda-12:default
      resource_class: gpu.nvidia.medium

    environment:
      DOCKER_BUILDKIT: 1

    steps:
      - checkout

      - run:
          name: Verify GPU is visible
          command: nvidia-smi

      - run:
          name: Build Docker image with GPU support
          command: |
            docker build \
              --gpus all \
              -t my‑org/my‑project:latest \
              .

workflows:
  gpu-build:
    jobs:
      - build-with-gpu
